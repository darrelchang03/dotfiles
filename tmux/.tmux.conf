# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set-option -g default-shell /bin/zsh
set -s escape-time 0
set -g history-limit 50000
set -g status-interval 5
set -g renumber-windows on
set -g set-clipboard on
set -g allow-passthrough on
set -g mouse on
setw -g aggressive-resize on
set -g extended-keys on
set -g extended-keys-format csi-u
set -sg escape-time 10
set -g focus-events on
set -g detach-on-destroy off
set -g base-index 1
setw -g pane-base-index 1

# Pane Controls
 bind h split-window -v -c "#{pane_current_path}"
 bind v split-window -h -c "#{pane_current_path}"
 bind x kill-pane

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

# Settings for image.nvim to work
set -g allow-passthrough on
set -g visual-activity off

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Optional: enable auto restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'     # autosave every 5 minutes
# Removed manual save-on-teardown hooks: they ran resurrect's save.sh while a
# client was detaching / a session was closing, i.e. when tmux subcommands emit
# "no current target" / "server exited unexpectedly". Combined with yazi's image
# preview cleanup that produced stray files named after those errors. continuum's
# own periodic + on-exit autosave already covers persistence, so these were redundant.
# set-hook -g client-detached  'run-shell -b "~/.tmux/plugins/tmux-resurrect/scripts/save.sh"'
# set-hook -g session-closed   'run-shell -b "~/.tmux/plugins/tmux-resurrect/scripts/save.sh"'

# Prefix
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# make Prefix+s open the sessions-only tree (fullscreen for clarity)
unbind-key s
bind-key s choose-tree -s -Z

# Style
set -g status-style 'bg=#333333 fg=#5eacd3'
set -g status-right ""
set -g base-index 1

# Copy
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# Enable copy mode and yank to system clipboard with 'Y'
bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"

# Go to session home
bind-key H send-keys -l 'cd "$TMUX_SESSION_HOME"' \; send-keys C-m

# Reloading config
bind r source-file ~/.config/tmux/tmux.conf \; display "Tmux Configuration reloaded"

# Switch windows with Ctrl+number (no prefix)
bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5

# Vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/personal/todo.md"

# Example if I have long term projects
#bind-key -r G run-shell "~/.local/bin/tmux-sessionizer ~/work/nrdp"

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
